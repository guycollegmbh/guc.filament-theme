<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<!--
    GUYCOLLE Logo – Dark-Background Variant
    Identisch mit logo-full.svg, aber alle 7 Pfade mit fill:rgb(35,31,32) (GUY-Schriftzug
    und die 4 Deko-Rects) wurden auf fill:rgb(255,255,255) gesetzt, damit sie auf dunklem
    Untergrund (#231F20) sichtbar sind. Die 5 "COLLE"-Pfade + 1 kleines Quadrat bleiben
    cyan (rgb(0,174,239)) weil die Farbe auf beiden Backgrounds identifizierbar ist.

    Einsatzgebiet: Sidebar-Header des Filament-Panels (BG ist nach v1.0.2 in beiden Modi
    #231F20), zukünftig auch Login-Page im Dark Mode als Ersatz für den Invert-Filter.
-->
